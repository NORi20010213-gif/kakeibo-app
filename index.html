<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<title>家計簿</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --ink: #111111;
    --paper: #fafafa;
    --card: #ffffff;
    --line: #f0f0f0;
    --muted: #aaaaaa;
    --accent: #E8711A;
    --accent-bg: #FFF4EE;
    --danger: #D32F2F;
    --danger-bg: #FFF0F0;
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    color: var(--ink);
    overscroll-behavior: none;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .status-spacer {
    height: env(safe-area-inset-top);
    background: var(--card);
  }

  header.app-header {
    background: var(--card);
    padding: 14px 20px 16px;
    border-bottom: 0.5px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .eyebrow {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    margin-bottom: 4px;
    font-weight: 600;
  }

  h1 {
    font-size: 19px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.3px;
  }

  main {
    flex: 1;
    padding: 14px 16px 12px;
    overflow-y: auto;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }

  .card-pad { padding: 14px; }

  .field-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1.2px;
    margin-bottom: 8px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .cat-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .cat-pill {
    border-radius: 20px;
    padding: 7px 12px;
    font-size: 12px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }

  .cat-pill.selected {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }

  .income-toggle {
    display: flex;
    background: var(--paper);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 12px;
  }

  .income-toggle button {
    flex: 1;
    border: none;
    background: none;
    padding: 9px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
  }

  .income-toggle button.active {
    background: var(--ink);
    color: white;
  }

  .input-row {
    border-bottom: 0.5px solid var(--line);
    padding: 11px 14px;
  }

  .input-row:last-child { border-bottom: none; }

  .input-row input, .input-row select {
    width: 100%;
    border: none;
    background: none;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    font-family: inherit;
    padding: 0;
  }

  .input-row input::placeholder { color: #ddd; }

  .amount-input {
    font-size: 24px !important;
    font-weight: 300;
    letter-spacing: -0.5px;
  }

  .yen-prefix {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .yen-prefix span {
    font-size: 16px;
    color: var(--muted);
    font-weight: 300;
  }

  button.submit {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-top: 4px;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }

  button.submit:active { transform: scale(0.98); opacity: 0.85; }
  button.submit:disabled { background: #ddd; }

  /* Summary view */
  .summary-hero {
    padding: 18px;
  }

  .summary-amount {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -1px;
    margin: 4px 0 2px;
  }

  .summary-sub {
    font-size: 11px;
    color: var(--muted);
  }

  .bar-bg {
    background: var(--line);
    border-radius: 4px;
    height: 5px;
    margin-top: 10px;
    overflow: hidden;
  }

  .bar-fill {
    height: 5px;
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .cat-row {
    padding: 11px 14px;
    border-bottom: 0.5px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .cat-row:last-child { border-bottom: none; }

  .cat-row-name {
    font-size: 12px;
    color: var(--ink);
    margin-bottom: 5px;
  }

  .cat-row-bar { width: 110px; }

  .cat-row-amount {
    font-size: 12px;
    color: var(--ink);
    text-align: right;
    margin-bottom: 3px;
    font-variant-numeric: tabular-nums;
  }

  .tag {
    display: inline-block;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 9px;
    font-weight: 600;
  }

  .tag.over { background: var(--danger-bg); color: var(--danger); }
  .tag.warn { background: var(--accent-bg); color: var(--accent); }
  .tag.ok { color: var(--muted); }

  .section-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1.2px;
    margin: 4px 2px 8px;
    font-weight: 600;
    text-transform: uppercase;
  }

  /* Bottom nav */
  nav.bottom-nav {
    display: flex;
    background: var(--card);
    border-top: 0.5px solid var(--line);
    padding: 6px 10px;
    padding-bottom: calc(6px + env(safe-area-inset-bottom));
    gap: 4px;
    position: sticky;
    bottom: 0;
  }

  .nav-item {
    flex: 1;
    padding: 8px 4px;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    border-radius: 10px;
    letter-spacing: 0.5px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s ease, color 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .nav-item.active {
    color: var(--accent);
    background: var(--accent-bg);
    font-weight: 700;
  }

  .nav-icon {
    width: 18px;
    height: 18px;
  }

  .nav-icon svg { width: 100%; height: 100%; }

  .view { display: none; }
  .view.active { display: block; }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--ink);
    color: white;
    padding: 11px 20px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 12px;
  }

  /* パスワード画面 */
  #lock-screen {
    position: fixed;
    inset: 0;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
  }

  #lock-screen.hidden { display: none; }

  .lock-title {
    color: white;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }

  .lock-sub {
    color: #777;
    font-size: 11px;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }

  #lock-input {
    width: 100%;
    max-width: 280px;
    padding: 14px 16px;
    border-radius: 12px;
    border: none;
    background: #1f1f1f;
    color: white;
    font-size: 15px;
    text-align: center;
    letter-spacing: 2px;
    outline: none;
    margin-bottom: 14px;
  }

  #lock-input::placeholder { color: #555; letter-spacing: normal; }

  #lock-btn {
    width: 100%;
    max-width: 280px;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
  }

  .lock-error {
    color: var(--danger);
    font-size: 11px;
    margin-top: 10px;
    height: 14px;
  }

  .skeleton {
    background: linear-gradient(90deg, #f0f0f0 25%, #f7f7f7 37%, #f0f0f0 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 6px;
  }

  @keyframes shimmer {
    0% { background-position: 100% 50%; }
    100% { background-position: 0 50%; }
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-title">家計簿</div>
  <div class="lock-sub">パスワードを入力してください</div>
  <input type="password" id="lock-input" placeholder="••••••••" inputmode="text">
  <button id="lock-btn" onclick="checkPassword()">ログイン</button>
  <div class="lock-error" id="lock-error"></div>
</div>

<div id="app">
  <div class="status-spacer"></div>

  <header class="app-header">
    <div class="eyebrow" id="header-period">読み込み中</div>
    <h1 id="header-title">収支入力</h1>
  </header>

  <main>
    <!-- 入力ビュー -->
    <div id="view-input" class="view active">

      <div class="card card-pad">
        <div class="income-toggle">
          <button id="btn-expense" class="active" onclick="setMode('expense')">支出</button>
          <button id="btn-income" onclick="setMode('income')">収入</button>
        </div>
        <div class="field-label">カテゴリ</div>
        <div class="cat-grid" id="cat-grid">
          <div class="skeleton" style="width:70px;height:28px;"></div>
          <div class="skeleton" style="width:50px;height:28px;"></div>
          <div class="skeleton" style="width:60px;height:28px;"></div>
        </div>
      </div>

      <div class="card">
        <div class="input-row">
          <div class="field-label" style="margin-bottom:6px;">金額</div>
          <div class="yen-prefix">
            <span>¥</span>
            <input type="number" inputmode="numeric" id="input-amount" class="amount-input" placeholder="0">
          </div>
        </div>
        <div class="input-row">
          <div class="field-label" style="margin-bottom:6px;">内容（メモ）</div>
          <input type="text" id="input-memo" placeholder="例：スーパー">
        </div>
        <div class="input-row">
          <div class="field-label" style="margin-bottom:6px;">日付</div>
          <input type="date" id="input-date">
        </div>
        <div class="input-row">
          <div class="field-label" style="margin-bottom:6px;">備考（任意）</div>
          <input type="text" id="input-note" placeholder="例：クレジット">
        </div>
      </div>

      <button class="submit" id="btn-submit" onclick="submitEntry()">登録する</button>
    </div>

    <!-- サマリービュー -->
    <div id="view-summary" class="view">
      <div id="summary-content">
        <div class="card card-pad">
          <div class="skeleton" style="width:80px;height:10px;margin-bottom:10px;"></div>
          <div class="skeleton" style="width:140px;height:28px;"></div>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-input" onclick="switchView('input')">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      入力
    </div>
    <div class="nav-item" id="nav-summary" onclick="switchView('summary')">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18M7 16l4-6 3 3 5-7"/></svg>
      </div>
      サマリー
    </div>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script>
// ===== ここにGASのウェブアプリURLを設定 =====
const API_URL = "https://script.google.com/macros/s/AKfycbxkFeQRALKJTyJ5K0o-mVhl-R2a1Zo5-Nt3cEh-M-dIuvMpoozwBZtd2knP7bqS-rPtMQ/exec";
const APP_PASSWORD = "aada0213";

let storedPassword = "";

function checkPassword() {
  const input = document.getElementById('lock-input').value;
  if (input === APP_PASSWORD) {
    storedPassword = input;
    sessionStorage.setItem('kakeibo_auth', input);
    document.getElementById('lock-screen').classList.add('hidden');
    loadCategories();
  } else {
    document.getElementById('lock-error').textContent = 'パスワードが違います';
    document.getElementById('lock-input').value = '';
  }
}

document.getElementById('lock-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') checkPassword();
});

// セッション内で既にログイン済みか確認
(function checkSession() {
  const saved = sessionStorage.getItem('kakeibo_auth');
  if (saved === APP_PASSWORD) {
    storedPassword = saved;
    document.getElementById('lock-screen').classList.add('hidden');
  }
})();

const 収入カテゴリ = ["給与", "その他収入"];
let mode = "expense";
let selectedCategory = null;
let categories = [];
let summaryData = null;

// 初期化
document.getElementById('input-date').valueAsDate = new Date();

function setMode(m) {
  mode = m;
  document.getElementById('btn-expense').classList.toggle('active', m === 'expense');
  document.getElementById('btn-income').classList.toggle('active', m === 'income');
  selectedCategory = null;
  renderCategories();
}

function switchView(v) {
  document.getElementById('view-input').classList.toggle('active', v === 'input');
  document.getElementById('view-summary').classList.toggle('active', v === 'summary');
  document.getElementById('nav-input').classList.toggle('active', v === 'input');
  document.getElementById('nav-summary').classList.toggle('active', v === 'summary');
  document.getElementById('header-title').textContent = v === 'input' ? '収支入力' : 'サマリー';
  if (v === 'summary') loadSummary();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function renderCategories() {
  const grid = document.getElementById('cat-grid');
  const filtered = categories.filter(c => 
    mode === 'income' ? 収入カテゴリ.includes(c) : !収入カテゴリ.includes(c)
  );
  grid.innerHTML = filtered.map(cat => 
    `<div class="cat-pill ${selectedCategory === cat ? 'selected' : ''}" onclick="selectCategory('${cat.replace(/'/g, "\\'")}')">${cat}</div>`
  ).join('');
}

function selectCategory(cat) {
  selectedCategory = cat;
  renderCategories();
}

async function loadCategories() {
  try {
    const res = await fetch(`${API_URL}?action=getCategories&pw=${encodeURIComponent(storedPassword)}`);
    const data = await res.json();
    categories = data.categories || [];
    renderCategories();
    loadHeaderPeriod();
  } catch (e) {
    document.getElementById('cat-grid').innerHTML = '<div class="empty-state">読み込みに失敗しました</div>';
  }
}

async function loadHeaderPeriod() {
  try {
    const res = await fetch(`${API_URL}?action=getSummary&pw=${encodeURIComponent(storedPassword)}`);
    const data = await res.json();
    document.getElementById('header-period').textContent = `${data.year}年 ${data.month}月`;
  } catch (e) {}
}

async function submitEntry() {
  if (!selectedCategory) { showToast('カテゴリを選んでください'); return; }
  const amount = parseInt(document.getElementById('input-amount').value);
  if (!amount || amount <= 0) { showToast('金額を入力してください'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '登録中...';

  const payload = {
    pw: storedPassword,
    category: selectedCategory,
    memo: document.getElementById('input-memo').value,
    date: document.getElementById('input-date').value,
    note: document.getElementById('input-note').value,
    income: mode === 'income' ? amount : 0,
    expense: mode === 'expense' ? amount : 0,
  };

  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });
    showToast('登録しました');
    document.getElementById('input-amount').value = '';
    document.getElementById('input-memo').value = '';
    document.getElementById('input-note').value = '';
    selectedCategory = null;
    renderCategories();
  } catch (e) {
    showToast('登録に失敗しました');
  } finally {
    btn.disabled = false;
    btn.textContent = '登録する';
  }
}

async function loadSummary() {
  const container = document.getElementById('summary-content');
  try {
    const res = await fetch(`${API_URL}?action=getSummary&pw=${encodeURIComponent(storedPassword)}`);
    const data = await res.json();
    summaryData = data;
    document.getElementById('header-period').textContent = `${data.year}年 ${data.month}月`;

    const income = parseFloat(data.income) || 0;
    const expense = parseFloat(data.expense) || 0;
    const balance = parseFloat(data.balance) || 0;
    const usedPercent = income > 0 ? Math.min(Math.round(expense / income * 100), 100) : 0;

    let catHTML = '';
    if (data.categories && data.categories.length > 0) {
      catHTML = data.categories.map(c => {
        let tagHTML = `<span class="tag ok">${c.percent}%</span>`;
        let barColor = '#ddd';
        if (c.percent >= 100) { tagHTML = `<span class="tag over">超過</span>`; barColor = 'var(--danger)'; }
        else if (c.percent >= 80) { tagHTML = `<span class="tag warn">${c.percent}%</span>`; barColor = 'var(--accent)'; }
        const barWidth = Math.min(c.percent, 100);
        return `
          <div class="cat-row">
            <div style="flex:1;">
              <div class="cat-row-name">${c.name}</div>
              <div class="bar-bg cat-row-bar">
                <div class="bar-fill" style="width:${barWidth}%; background:${barColor};"></div>
              </div>
            </div>
            <div style="text-align:right;">
              <div class="cat-row-amount">¥${c.amount.toLocaleString()}</div>
              ${tagHTML}
            </div>
          </div>`;
      }).join('');
    } else {
      catHTML = '<div class="empty-state">カテゴリデータがありません</div>';
    }

    container.innerHTML = `
      <div class="card card-pad summary-hero">
        <div class="field-label">今月の支出</div>
        <div class="summary-amount">¥${expense.toLocaleString()}</div>
        <div class="summary-sub">収入 ¥${income.toLocaleString()} の ${usedPercent}%</div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${usedPercent}%; background:var(--accent);"></div>
        </div>
      </div>
      <div class="card card-pad" style="display:flex; justify-content:space-between;">
        <div>
          <div class="field-label">残高</div>
          <div style="font-size:16px; font-weight:600; color:${balance >= 0 ? 'var(--ink)' : 'var(--danger)'};">¥${balance.toLocaleString()}</div>
        </div>
      </div>
      <div class="section-label">カテゴリ別</div>
      <div class="card">${catHTML}</div>
    `;
  } catch (e) {
    container.innerHTML = '<div class="empty-state">読み込みに失敗しました<br>もう一度お試しください</div>';
  }
}

loadCategories();

// Service Worker登録（オフライン対応・ホーム画面アイコン用）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
